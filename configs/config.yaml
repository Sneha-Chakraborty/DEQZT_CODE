data:
  time_column: "ts"
  label_column: "hypothesis"
  binary_label_column: "is_attack"
  dataset_column: "dataset"
  cloud_column: "cloud"
  session_keys: ["principal_id", "cloud"]

dirichlet:
  hypotheses:
    - BENIGN
    - CREDENTIAL_MISUSE
    - PRIV_ESC
    - LATERAL_MOVEMENT
    - DATA_EXFILTRATION
    - DEFENSE_EVASION
    - NETWORK_INTRUSION

risk_weights:
  BENIGN: 0.0
  CREDENTIAL_MISUSE: 0.6
  PRIV_ESC: 0.7
  LATERAL_MOVEMENT: 0.8
  DATA_EXFILTRATION: 1.0
  DEFENSE_EVASION: 0.8
  NETWORK_INTRUSION: 0.7

split:
  train: 0.70
  val: 0.10
  test: 0.20

split_quality:
  deduplicate_before_split: true
  use_group_split: true
  min_test_count_per_label: 1
  min_val_count_per_label: 1

tuning:
  tau_low_grid: [0.03, 0.05, 0.08, 0.12, 0.18]
  tau_high_grid: [0.18, 0.22, 0.28, 0.35, 0.45]
  u_quantiles: [0.60, 0.75, 0.90, 0.98]
  beta_u_grid: [0.10, 0.25, 0.40]
  min_stepup_risk_grid: [0.00, 0.05, 0.10]
  detect_on_stepup: true
  # fpr_max: 0.20

session_eval:
  contain_within_n_events: 3

edl:
  feature_prefixes: ["e__", "f__"]
  max_features: 256
  hidden_sizes: [256, 128]
  dropout: 0.20
  lr: 0.001
  epochs: 15
  batch_size: 1024
  infer_batch_size: 4096
  anneal_epochs: 10
  weight_decay: 0.0001
  loss_type: "log"
  seed: 42
  device: "cpu"

temporal:
  lambda: 0.85
  lambda_grid: [0.00, 0.50, 0.85]
  beta_u: 0.35
